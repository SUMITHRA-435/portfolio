<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mountain Pass Portfolio | Sumithra</title>
    <style>
        /* Existing Styles (condensed for brevity - keep as before) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            background: #0a1f2e;
            color: white;
        }

        /* Fixed Navigation Bar */
        #navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 25, 35, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 170, 0, 0.3);
            z-index: 100;
            padding: 0.6rem 1rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        #navbar ul {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            list-style: none;
            gap: 1.2rem;
        }

        #navbar ul li a {
            color: #eee;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            padding: 0.4rem 0.8rem;
            border-radius: 30px;
            transition: all 0.3s;
            letter-spacing: 0.5px;
            border: 1px solid transparent;
        }

        #navbar ul li a:hover {
            background: rgba(255, 170, 0, 0.2);
            border-color: #ffaa00;
            color: #ffaa00;
        }

        /* Scroll Progress Bar */
        #scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background: #ffaa00;
            width: 0%;
            z-index: 200;
            transition: width 0.1s;
            box-shadow: 0 0 8px #ffaa00;
        }

        /* Instruction */
        #instruction {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.9);
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 90;
            white-space: nowrap;
            border: 1px solid rgba(255,170,0,0.3);
            pointer-events: none;
        }

        /* Side Panel (section details) */
        #section-panel {
            position: fixed;
            right: 20px;
            top: 80px;
            width: 320px;
            max-width: calc(100vw - 40px);
            background: rgba(20, 25, 35, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: white;
            padding: 22px 20px;
            border-radius: 24px;
            border-left: 5px solid #ffaa00;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            z-index: 80;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #section-panel.hidden {
            opacity: 0;
            visibility: hidden;
            transform: translateX(20px);
        }

        #section-title {
            font-size: 1.7rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: #ffaa00;
            text-shadow: 0 2px 5px rgba(255,170,0,0.3);
        }

        #section-content {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #ddd;
            word-wrap: break-word;
        }

        #section-content a {
            color: #ffaa00;
            text-decoration: none;
            border-bottom: 1px dotted;
        }

        /* Responsive: panel moves to bottom on small screens */
        @media (max-width: 700px) {
            #navbar ul {
                gap: 0.5rem;
            }
            #navbar ul li a {
                font-size: 0.8rem;
                padding: 0.3rem 0.6rem;
            }
            #section-panel {
                right: auto;
                left: 20px;
                top: auto;
                bottom: 80px;
                width: calc(100% - 40px);
                max-width: 400px;
                margin: 0 auto;
                border-left: none;
                border-bottom: 5px solid #ffaa00;
                border-radius: 20px;
            }
            #instruction {
                bottom: 10px;
                font-size: 12px;
                white-space: normal;
                width: 90%;
                text-align: center;
            }
        }

        /* Canvas takes full screen */
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Bend indicator */
        #bend-indicator {
            position: fixed;
            bottom: 80px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            border-left: 3px solid #ffaa00;
            z-index: 70;
            color: #ffaa00;
            font-weight: 500;
        }
        @media (max-width: 700px) {
            #bend-indicator {
                bottom: 150px;
                left: 20px;
                font-size: 12px;
            }
        }

        /* ---------- Chatbot Styles ---------- */
        #chat-button {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #ffaa00;
            color: #0a1f2e;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,170,0,0.4);
            z-index: 150;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background 0.2s;
        }

        #chat-button:hover {
            transform: scale(1.1);
            background: #ffbb22;
        }

        #chat-container {
            position: fixed;
            bottom: 180px;
            right: 20px;
            width: 350px;
            max-width: calc(100vw - 40px);
            height: 450px;
            background: rgba(20, 25, 35, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255,170,0,0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 160;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: opacity 0.3s, visibility 0.3s, transform 0.3s;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
        }

        #chat-container.open {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        #chat-header {
            background: rgba(255,170,0,0.2);
            padding: 15px;
            font-weight: bold;
            color: #ffaa00;
            border-bottom: 1px solid rgba(255,170,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #chat-close {
            background: none;
            border: none;
            color: #ffaa00;
            font-size: 20px;
            cursor: pointer;
        }

        #chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 14px;
        }

        .user-message {
            align-self: flex-end;
            background: #ffaa00;
            color: #0a1f2e;
            border-bottom-right-radius: 5px;
        }

        .bot-message {
            align-self: flex-start;
            background: rgba(255,255,255,0.1);
            color: #eee;
            border-bottom-left-radius: 5px;
        }

        #chat-input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid rgba(255,170,0,0.3);
        }

        #chat-input {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,170,0,0.5);
            border-radius: 30px;
            padding: 10px 15px;
            color: white;
            outline: none;
        }

        #chat-send {
            background: #ffaa00;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            margin-left: 8px;
            color: #0a1f2e;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 700px) {
            #chat-button {
                bottom: 150px;
                right: 10px;
            }
            #chat-container {
                bottom: 220px;
                right: 10px;
                height: 400px;
            }
        }
    </style>
</head>
<body>
    <!-- Fixed Navigation -->
    <nav id="navbar">
        <ul>
            <li><a href="#" data-section="Home">Home</a></li>
            <li><a href="#" data-section="Skills">Skills</a></li>
            <li><a href="#" data-section="Projects">Projects</a></li>
            <li><a href="#" data-section="Education">Education</a></li>
            <li><a href="#" data-section="Certification">Certification</a></li>
            <li><a href="#" data-section="Contact">Contact</a></li>
        </ul>
    </nav>

    <!-- Progress bar -->
    <div id="scroll-progress"></div>

    <!-- Info panel (shows current section) -->
    <div id="section-panel" class="hidden">
        <div id="section-title">Home</div>
        <div id="section-content"></div>
    </div>

    <!-- Bend indicator -->
    <div id="bend-indicator">🏔️ Hairpin <span id="current-bend">1</span>/7</div>

    <!-- Scroll instruction -->
    <div id="instruction">⬇️ Scroll to drive — each bend reveals a section</div>

    <!-- Chatbot Button and Container -->
    <button id="chat-button">💬</button>
    <div id="chat-container">
        <div id="chat-header">
            <span>Mountain Guide 🏔️</span>
            <button id="chat-close">✖</button>
        </div>
        <div id="chat-messages">
            <div class="message bot-message">Hello! I'm your virtual guide. Ask me about Sumithra's skills, projects, education, or contact.</div>
        </div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
            <button id="chat-send">➤</button>
        </div>
    </div>

    <!-- Import Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        // --- Existing Three.js code (unchanged, but we must ensure it doesn't conflict with chatbot) ---
        import * as THREE from 'three';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- Setup Scene, Camera, Renderers ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a2b3c);
        scene.fog = new THREE.Fog(0x1a2b3c, 60, 200);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // CSS2 Renderer for floating labels
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        sunLight.position.set(50, 100, 50);
        sunLight.castShadow = true;
        sunLight.receiveShadow = true;
        sunLight.shadow.mapSize.width = 1024;
        sunLight.shadow.mapSize.height = 1024;
        const d = 150;
        sunLight.shadow.camera.left = -d;
        sunLight.shadow.camera.right = d;
        sunLight.shadow.camera.top = d;
        sunLight.shadow.camera.bottom = -d;
        sunLight.shadow.camera.near = 1;
        sunLight.shadow.camera.far = 200;
        scene.add(sunLight);

        const fillLight = new THREE.PointLight(0x4466ff, 0.5);
        fillLight.position.set(-30, 20, 30);
        scene.add(fillLight);

        // --- Create Mountain Terrain ---
        const groundGeo = new THREE.PlaneGeometry(300, 300, 100, 100);
        groundGeo.rotateX(-Math.PI / 2);
        
        const positionAttribute = groundGeo.attributes.position;
        for (let i = 0; i < positionAttribute.count; i++) {
            const x = positionAttribute.getX(i);
            const z = positionAttribute.getZ(i);
            let y = Math.sin(x * 0.05) * Math.cos(z * 0.05) * 10;
            y += Math.sin(x * 0.1) * 4;
            y += Math.sin(z * 0.12) * 5;
            y = Math.max(0, y + 5);
            positionAttribute.setY(i, y);
        }
        groundGeo.computeVertexNormals();

        const groundMat = new THREE.MeshStandardMaterial({ color: 0x2d4a2d, roughness: 0.7 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.receiveShadow = true;
        ground.castShadow = false;
        scene.add(ground);

        // Add some rocks
        for (let i = 0; i < 40; i++) {
            const rockGeo = new THREE.DodecahedronGeometry(0.6 + Math.random()*1.2);
            const rockMat = new THREE.MeshStandardMaterial({ color: 0x777777, roughness: 0.8 });
            const rock = new THREE.Mesh(rockGeo, rockMat);
            const angle = Math.random() * Math.PI * 2;
            const radius = 40 + Math.random() * 80;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            const y = 2 + Math.random() * 8;
            rock.position.set(x, y, z);
            rock.castShadow = true;
            rock.receiveShadow = true;
            scene.add(rock);
        }

        // --- Create Road with 7 hairpin bends ---
        const points = [];
        const numBends = 7;
        const radius = 35;
        const heightStep = 12;

        for (let i = 0; i <= numBends; i++) {
            const angle = i * 1.8;
            const x = Math.sin(angle) * radius * (1 + 0.2 * Math.sin(angle * 0.5));
            const z = Math.cos(angle) * radius * 1.4;
            const y = i * heightStep + Math.sin(angle * 2) * 4;
            points.push(new THREE.Vector3(x, y, z));
        }

        const curve = new THREE.CatmullRomCurve3(points);
        
        const tubeGeo = new THREE.TubeGeometry(curve, 200, 0.7, 8, false);
        const tubeMat = new THREE.MeshStandardMaterial({ color: 0x7a5a3a, roughness: 0.6 });
        const tube = new THREE.Mesh(tubeGeo, tubeMat);
        tube.receiveShadow = true;
        tube.castShadow = true;
        scene.add(tube);

        const markingMat = new THREE.MeshStandardMaterial({ color: 0xffaa00 });
        for (let i = 0; i <= 180; i++) {
            const t = i / 180;
            const point = curve.getPoint(t);
            const tangent = curve.getTangent(t);
            const normal = new THREE.Vector3(0, 1, 0);
            const binormal = new THREE.Vector3().crossVectors(tangent, normal).normalize();
            
            const marker = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 1.2), markingMat);
            marker.position.copy(point.clone().add(binormal.clone().multiplyScalar(1.5)));
            marker.position.y += 0.2;
            marker.castShadow = true;
            marker.receiveShadow = true;
            scene.add(marker);
            
            const marker2 = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 1.2), markingMat);
            marker2.position.copy(point.clone().add(binormal.clone().multiplyScalar(-1.5)));
            marker2.position.y += 0.2;
            marker2.castShadow = true;
            marker2.receiveShadow = true;
            scene.add(marker2);
        }

        // --- Define Section Data (7 sections) ---
        const sections = [
            {
                title: "Sumithra",
                content: `<strong>Sumithra</strong><br>
                          Aspiring Software Engineer<br>
                          Electronics and Communication Engineering Student<br><br>
                          📧 sumithrasumithrat165@gmail.com<br>
                          🔗 linkedin.com/in/sumithra<br>
                          🐙 github.com/sumithra`
            },
            {
                title: "Home",
                content: `<strong>About Me</strong><br><br>
                          I am an Electronics and Communication Engineering student with a strong interest in Artificial Intelligence and Machine Learning. I am passionate about using technology to solve real-world problems.<br><br>
                          Currently, I am expanding my knowledge in Deep Learning and continuously improving my skills to stay aligned with industry needs. I am eager to apply my learning in real-world environments, contribute to innovative projects, and grow as a technology professional.`
            },
            {
                title: "Skills",
                content: `<strong>Programming Languages:</strong><br>
                          • C<br>
                          • C++<br>
                          • Java<br>
                          • HTML<br>
                          • CSS<br><br>
                          <em>Tools & Interests:</em> MATLAB, Deep Learning, Wireless Communication`
            },
            {
                title: "Projects",
                content: `<strong>Smart Waste Segregation Monitoring System:</strong><br>
                          Developed for Smart India Hackathon, this system automates waste identification and tracking in municipal environments to reduce manual effort.<br><br>
                          <strong>AI-Driven Wireless Communication System:</strong><br>
                          Ongoing project using MATLAB to dynamically optimize modulation and coding schemes for better reliability in wireless networks.`
            },
            {
                title: "Education",
                content: `<strong>Government College of Engineering, Salem</strong><br>
                          B.E Electronics and Communication Engineering (2023–2027)<br>
                          CGPA: 8.41<br><br>
                          <strong>Trinity Matriculation Higher Secondary School</strong><br>
                          Grade 12 (2022–2023)<br>
                          Grade: 93.66%`
            },
            {
                title: "Certification",
                content: `<strong>Online Course Certification</strong><br>
                          • Completed a certified online course in [Your Course Name].<br>
                          • Continuously upgrading skills through MOOCs and workshops.`
            },
            {
                title: "Contact",
                content: `<strong>Email:</strong> sumithrasumithrat165@gmail.com<br>
                          <strong>LinkedIn:</strong> <a href="#" target="_blank">linkedin.com/in/sumithra</a><br>
                          <strong>GitHub:</strong> <a href="#" target="_blank">github.com/sumithra</a><br><br>
                          <em>Let's connect and collaborate!</em>`
            }
        ];

        // --- Create Markers at each bend ---
        const markers = [];
        
        for (let i = 1; i <= numBends; i++) {
            const point = points[i];
            const sectionIndex = i - 1;
            
            const isSpecial = (sectionIndex === 3); // Projects bend
            const color = isSpecial ? 0xffaa00 : 0x44aaff;
            const emissive = isSpecial ? 0x442200 : 0x112233;
            
            const geo = new THREE.OctahedronGeometry(1.4);
            const mat = new THREE.MeshStandardMaterial({ color, emissive, roughness: 0.2, metalness: 0.3, transparent: true, opacity: 0.9 });
            const marker = new THREE.Mesh(geo, mat);
            marker.position.copy(point.clone().add(new THREE.Vector3(0, 5, 0)));
            marker.castShadow = true;
            marker.receiveShadow = true;
            scene.add(marker);
            
            if (isSpecial) {
                const ringGeo = new THREE.TorusGeometry(2.2, 0.2, 16, 60);
                const ringMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0x331100 });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.rotation.x = Math.PI / 2;
                ring.rotation.z = 0.3;
                marker.add(ring);
            }

            markers.push({
                mesh: marker,
                sectionIndex,
                point: point.clone(),
                title: sections[sectionIndex].title,
                content: sections[sectionIndex].content,
                isSpecial
            });

            const div = document.createElement('div');
            div.textContent = sections[sectionIndex].title;
            div.style.color = 'white';
            div.style.fontSize = '18px';
            div.style.fontWeight = 'bold';
            div.style.textShadow = '1px 1px 3px black';
            div.style.background = 'rgba(0,0,0,0.6)';
            div.style.padding = '2px 12px';
            div.style.borderRadius = '20px';
            div.style.border = isSpecial ? '2px solid #ffaa00' : 'none';
            div.style.whiteSpace = 'nowrap';
            
            const label = new CSS2DObject(div);
            label.position.copy(point.clone().add(new THREE.Vector3(0, 7, 0)));
            scene.add(label);
        }

        // --- Waterfall and Cave for Projects ---
        const specialMarker = markers.find(m => m.isSpecial);
        if (specialMarker) {
            const cavePos = specialMarker.point.clone().add(new THREE.Vector3(6, -2, 5));
            
            const caveGroup = new THREE.Group();
            for (let j = 0; j < 8; j++) {
                const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(1.5 + Math.random()), new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.9 }));
                const angle = (j / 8) * Math.PI * 2;
                const r = 4;
                rock.position.set(Math.cos(angle)*r, Math.sin(angle)*r + 2, 0);
                caveGroup.add(rock);
            }
            caveGroup.position.copy(cavePos);
            scene.add(caveGroup);

            const glowGeo = new THREE.SphereGeometry(2, 16, 16);
            const glowMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xff5500 });
            const glowSphere = new THREE.Mesh(glowGeo, glowMat);
            glowSphere.position.set(cavePos.x, cavePos.y, cavePos.z + 2.5);
            scene.add(glowSphere);
            
            const caveLight = new THREE.PointLight(0xffaa00, 2, 20);
            caveLight.position.copy(glowSphere.position);
            scene.add(caveLight);

            const particleCount = 600;
            const particleGeo = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);
            
            const waterfallStart = cavePos.clone().add(new THREE.Vector3(-5, 12, -2));
            
            for (let i = 0; i < particleCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = 2.5 + Math.random() * 4;
                const xOffset = Math.cos(angle) * radius;
                const zOffset = Math.sin(angle) * radius;
                const yOffset = Math.random() * 18;
                
                positions[i*3] = waterfallStart.x + xOffset;
                positions[i*3+1] = waterfallStart.y - yOffset;
                positions[i*3+2] = waterfallStart.z + zOffset;
                
                const color = new THREE.Color().setHSL(0.6, 0.9, 0.6 + Math.random()*0.3);
                colors[i*3] = color.r;
                colors[i*3+1] = color.g;
                colors[i*3+2] = color.b;
            }
            
            particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            particleGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            
            const particleMat = new THREE.PointsMaterial({ size: 0.45, vertexColors: true, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending });
            const particles = new THREE.Points(particleGeo, particleMat);
            scene.add(particles);
            
            specialMarker.particles = particles;
            specialMarker.waterfallStart = waterfallStart;
        }

        // --- Scroll Interaction ---
        let scrollProgress = 0;
        const totalScrollHeight = 6000;
        document.body.style.height = `${totalScrollHeight}px`;

        const panel = document.getElementById('section-panel');
        const panelTitle = document.getElementById('section-title');
        const panelContent = document.getElementById('section-content');
        const bendSpan = document.getElementById('current-bend');

        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            const maxScroll = totalScrollHeight - window.innerHeight;
            scrollProgress = Math.min(1, Math.max(0, scrollY / maxScroll));
            
            document.getElementById('scroll-progress').style.width = (scrollProgress * 100) + '%';
            
            const point = curve.getPoint(scrollProgress);
            const tangent = curve.getTangent(scrollProgress);
            
            const up = new THREE.Vector3(0, 1, 0);
            const binormal = new THREE.Vector3().crossVectors(tangent, up).normalize();
            const correctedUp = new THREE.Vector3().crossVectors(binormal, tangent).normalize();
            
            const camPos = point.clone()
                .add(binormal.clone().multiplyScalar(0))
                .add(correctedUp.clone().multiplyScalar(3))
                .add(tangent.clone().multiplyScalar(-7));
            
            camera.position.copy(camPos);
            
            const lookAtT = Math.min(1, scrollProgress + 0.03);
            const lookAtPoint = curve.getPoint(lookAtT);
            camera.lookAt(lookAtPoint);
            
            let nearestDist = 25;
            let nearestMarker = null;
            for (let m of markers) {
                const dist = point.distanceTo(m.point);
                if (dist < nearestDist) {
                    nearestDist = dist;
                    nearestMarker = m;
                }
            }
            
            if (nearestMarker) {
                panel.classList.remove('hidden');
                panelTitle.textContent = nearestMarker.title;
                panelContent.innerHTML = nearestMarker.content;
                bendSpan.textContent = nearestMarker.sectionIndex + 1;
            } else {
                panel.classList.add('hidden');
            }
            
            if (specialMarker && specialMarker.particles) {
                const distToSpecial = point.distanceTo(specialMarker.point);
                if (distToSpecial < 18) {
                    specialMarker.particles.material.opacity = 0.2 + 0.6 * Math.max(0, (distToSpecial - 6) / 12);
                } else {
                    specialMarker.particles.material.opacity = 0.7;
                }
            }
        });

        window.dispatchEvent(new Event('scroll'));

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            
            markers.forEach(m => {
                m.mesh.rotation.y += 0.008;
                m.mesh.rotation.x += 0.004;
            });
            
            if (specialMarker && specialMarker.particles) {
                const positions = specialMarker.particles.geometry.attributes.position.array;
                for (let i = 1; i < positions.length; i += 3) {
                    positions[i] -= 0.08;
                    if (positions[i] < specialMarker.waterfallStart.y - 18) {
                        positions[i] = specialMarker.waterfallStart.y;
                        positions[i-1] = specialMarker.waterfallStart.x + (Math.random() - 0.5) * 8;
                        positions[i+1] = specialMarker.waterfallStart.z + (Math.random() - 0.5) * 6;
                    }
                }
                specialMarker.particles.geometry.attributes.position.needsUpdate = true;
            }
            
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();

        // --- Resize Handler ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Navigation: smooth scroll to section ---
        document.querySelectorAll('#navbar ul li a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const sectionName = link.getAttribute('data-section');
                const targetIdx = sections.findIndex(s => s.title === sectionName);
                if (targetIdx >= 0) {
                    const targetMarker = markers.find(m => m.sectionIndex === targetIdx);
                    if (targetMarker) {
                        let bestT = 0;
                        let bestDist = Infinity;
                        for (let t = 0; t <= 1; t += 0.01) {
                            const pt = curve.getPoint(t);
                            const d = pt.distanceTo(targetMarker.point);
                            if (d < bestDist) {
                                bestDist = d;
                                bestT = t;
                            }
                        }
                        const scrollTarget = bestT * (totalScrollHeight - window.innerHeight);
                        window.scrollTo({ top: scrollTarget, behavior: 'smooth' });
                    }
                }
            });
        });

        // ---------- Chatbot Logic ----------
        const chatButton = document.getElementById('chat-button');
        const chatContainer = document.getElementById('chat-container');
        const chatClose = document.getElementById('chat-close');
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const chatSend = document.getElementById('chat-send');

        // Toggle chat
        chatButton.addEventListener('click', () => {
            chatContainer.classList.toggle('open');
        });

        chatClose.addEventListener('click', () => {
            chatContainer.classList.remove('open');
        });

        // Send message on button click or Enter
        function sendMessage() {
            const text = chatInput.value.trim();
            if (text === '') return;

            // Add user message
            const userMsg = document.createElement('div');
            userMsg.className = 'message user-message';
            userMsg.textContent = text;
            chatMessages.appendChild(userMsg);

            // Scroll to bottom
            chatMessages.scrollTop = chatMessages.scrollHeight;

            // Generate bot response
            setTimeout(() => {
                const botMsg = document.createElement('div');
                botMsg.className = 'message bot-message';
                botMsg.textContent = getBotResponse(text.toLowerCase());
                chatMessages.appendChild(botMsg);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }, 500);

            chatInput.value = '';
        }

        chatSend.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Simple response logic based on keywords
        function getBotResponse(input) {
            if (input.includes('hello') || input.includes('hi')) {
                return "Hello! How can I help you today?";
            } else if (input.includes('skill') || input.includes('programming')) {
                return sections[2].content.replace(/<[^>]*>/g, ''); // strip HTML
            } else if (input.includes('project')) {
                return sections[3].content.replace(/<[^>]*>/g, '');
            } else if (input.includes('education') || input.includes('college') || input.includes('school')) {
                return sections[4].content.replace(/<[^>]*>/g, '');
            } else if (input.includes('certification') || input.includes('course')) {
                return sections[5].content.replace(/<[^>]*>/g, '');
            } else if (input.includes('contact') || input.includes('email') || input.includes('linkedin')) {
                return sections[6].content.replace(/<[^>]*>/g, '');
            } else if (input.includes('name') || input.includes('who are you')) {
                return sections[0].content.replace(/<[^>]*>/g, '');
            } else if (input.includes('home') || input.includes('about')) {
                return sections[1].content.replace(/<[^>]*>/g, '');
            } else {
                return "I can tell you about Sumithra's skills, projects, education, certification, or contact. What would you like to know?";
            }
        }
    </script>
</body>
